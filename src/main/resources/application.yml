quarkus:
  http:
    port: 4000
    root-path: /api
  log:
    level: INFO
  hibernate-orm:
    schema-management:
      strategy: none
  fault-tolerance:
    global:
      rate-limit:
        value: 50
  container-image:
    build: true
    push: true
    registry: ghcr.io
    group: ${GITHUB_OWNER}
    name: musiccollection-backend
    tag: ${RELEASE_TAG}
    additional-tags: latest
    username: ${GITHUB_OWNER}
    password: ${GITHUB_TOKEN}
