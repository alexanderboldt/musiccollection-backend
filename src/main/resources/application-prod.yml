quarkus:
  devservices:
    enabled: false
  datasource:
    db-kind: postgresql
    jdbc:
      url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  flyway:
    enabled: true
    migrate-at-start: true
  oidc:
    auth-server-url: ${KC_URL}
    application-type: service
    token:
      principal-claim: sub
  s3:
    aws:
      region: ${S3_REGION}

bucket:
  artist: ${BUCKET_ARTIST}
  album: ${BUCKET_ALBUM}
