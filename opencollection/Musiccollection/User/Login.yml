info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL_KEYCLOAK}}/realms/musiccollection/protocol/openid-connect/token"
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: password
      - name: client_id
        value: musiccollection-client
      - name: client_secret
        value: 013rlJBpal5bDHq8LhV2TKGJNBOLm9eN
      - name: username
        value: barry
      - name: password
        value: barry

runtime:
  scripts:
    - type: after-response
      code: |-
        let accessToken = res.body.access_token;
        bru.setEnvVar("ACCESS_TOKEN", accessToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
