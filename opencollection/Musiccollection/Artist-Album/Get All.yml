info:
  name: Get All
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/v1/artists/:id/albums?sort=year"
  params:
    - name: sort
      value: year
      type: query
    - name: id
      value: "9"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
